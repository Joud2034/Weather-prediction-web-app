<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart Weather Predictor</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="background">

    <div class="glass-card">

        <h1>🌦 Smart Weather Predictor</h1>

        <p>
            Predict whether it will rain tomorrow using today's weather conditions.
        </p>

        <form action="/predict" method="POST">

            <div class="form-grid">

                <div class="input-box">
                    <label>Minimum Temperature (°C)</label>
                    <input type="number" step="0.1" name="MinTemp" required>
                </div>

                <div class="input-box">
                    <label>Maximum Temperature (°C)</label>
                    <input type="number" step="0.1" name="MaxTemp" required>
                </div>

                <div class="input-box">
                    <label>Rainfall (mm)</label>
                    <input type="number" step="0.1" name="Rainfall" required>
                </div>

                <div class="input-box">
                    <label>Humidity 9 AM (%)</label>
                    <input type="number" step="0.1" name="Humidity9am" required>
                </div>

                <div class="input-box">
                    <label>Humidity 3 PM (%)</label>
                    <input type="number" step="0.1" name="Humidity3pm" required>
                </div>

                <div class="input-box">
                    <label>Pressure 9 AM</label>
                    <input type="number" step="0.1" name="Pressure9am" required>
                </div>

                <div class="input-box">
                    <label>Pressure 3 PM</label>
                    <input type="number" step="0.1" name="Pressure3pm" required>
                </div>

                <div class="input-box">
                    <label>Rain Today</label>

                    <select name="RainToday" required>

                        <option value="">Choose...</option>
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>

                    </select>

                </div>

            </div>

            <button type="submit">

                🔮 Predict Weather

            </button>

        </form>

       {% if prediction %}

<div class="result {{ result_class }}">

<h2>{{ prediction }}</h2>

<p>Confidence: {{ confidence }}</p>

</div>

{% endif %}

    </div>

</div>

</body>

</html>
